<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPL SEASON-6 Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#050b18;
color:#fff;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#0b1224;
padding:20px;
border-right:1px solid rgba(255,255,255,.1);
overflow-y:auto;
}

.sidebar h2{
color:gold;
text-align:center;
margin-bottom:20px;
}

.sidebar h3{
color:Orange;
text-align:center;
margin-bottom:20px;
}

.team-btn{
padding:12px;
margin:8px 0;
background:rgba(255,255,255,.05);
border-radius:10px;
cursor:pointer;
text-align:center;
transition:.3s;
font-weight:600;
}

.team-btn:hover{
background:gold;
color:#000;
transform:scale(1.05);
}

/* MAIN */
.main{
flex:1;
overflow-y:auto;
padding:5px;
}

/* HERO */
.hero{
padding:15px;
border-radius:20px;
background:linear-gradient(135deg,#1d4ed8,#0b1224);
position:relative;
overflow:hidden;
}

.hero h1{
font-size:2rem;
color:gold;
}

.owner{
display:flex;
align-items:center;
gap:20px;
margin-top:15px;
}

.owner{
display:flex;
align-items:Left;
justify-content:Left;
gap:px;
margin-top:8px;
flex-wrap:wrap;
}

.stats{
display:flex;
gap:20px;
margin-top:20px;
}

.stat{
background:rgba(255,255,255,.08);
padding:15px;
border-radius:12px;
text-align:center;
width:120px;
}

/* SEARCH */
.search{
margin:10px 0;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

/* PLAYERS */
.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.player{
background:rgba(255,255,255,.07);
padding:15px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.player:hover{
transform:translateY(-8px);
background:rgba(255,215,0,.15);
}

.player img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:3px solid #fff;
}

.player h4{
margin-top:10px;
font-size:14px;
}





/* =========================
   MOBILE RESPONSIVE DESIGN
========================= */

@media (max-width: 768px) {

body{
flex-direction: column;
height: auto;
overflow-y: auto;
}

/* SIDEBAR → TOP BAR */
.sidebar{
width: 100%;
display: flex;
flex-direction: column;
align-items: center;
padding: 10px;
border-right: none;
border-bottom: 1px solid rgba(255,255,255,.1);
}

.sidebar h2{
font-size: 16px;
margin-bottom: 10px;
}

.team-btn{
display: inline-block;
width: 45%;
margin: 5px;
font-size: 12px;
padding: 8px;
}

/* MAIN AREA */
.main{
padding: 10px;
}

/* HERO */
.hero{
padding: 10px;
border-radius: 15px;
}

.hero h1{
font-size: 18px;
}

.owner{
flex-direction: column;
text-align: center;
gap: 10px;
}

.owner img{
width: 90px;
height: 90px;
}

/* STATS */
.stats{
flex-direction: column;
gap: 10px;
align-items: center;
}

.stat{
width: 90%;
}

/* SEARCH */
.search input{
padding: 10px;
font-size: 14px;
}

/* PLAYERS GRID */
.players{
grid-template-columns: repeat(2, 1fr);
gap: 10px;
}

.player img{
width: 70px;
height: 70px;
}

.player h4{
font-size: 12px;
}
}

/* SMALL MOBILE (extra fix) */
@media (max-width: 420px) {

.players{
grid-template-columns: repeat(1, 1fr);
}

.team-btn{
width: 100%;
}
}


#muteBtn{
padding:8px 15px;
margin-top:8px;
border:none;
border-radius:8px;
background:gold;
color:#000;
font-weight:600;
cursor:pointer;
}

#muteBtn:hover{
opacity:.9;
}

#dateTime{
font-size:14px;
font-weight:600;
color:#fff;
}


/* IMAGE ZOOM */

.image-modal{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
}

.modal-content{
    max-width:90%;
    max-height:90%;
    border-radius:15px;
    box-shadow:0 0 25px rgba(255,255,255,.3);
    animation:zoomIn .3s ease;
}

.close-modal{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:white;
    cursor:pointer;
}

@keyframes zoomIn{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.player img{
    cursor:pointer;
}

.poster-img{
    width:150px;
    height:auto;
    max-height:220px;
    object-fit:contain;
    border-radius:15px;
    border:3px solid gold;
    box-shadow:0 0 20px rgba(255,215,0,.5);
    cursor:pointer;
    transition:.3s;
}

.poster-img:hover{
    transform:scale(1.05);
}


@media (max-width:768px){
    .poster-img{
        width:90px;
        height:153px;
    }
}

@media (max-width:768px){
    .owner-photo{
        width:90px;
        height:90px;
    }


    .poster-img{
        width:90px;
        height:153px;
    }
}



.owner-photo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid gold;
    box-shadow:0 0 15px rgba(255,215,0,.4);
}

.poster-img{
    width:150px;
    height:255px;
    object-fit:cover;
    border-radius:15px;
    border:3px solid gold;
}

.trophy-img{
    width:150px;
    height:220px;
    object-fit:cover;
    border-radius:15px;
    border:3px solid gold;
}

.logo-banner{
    position:relative;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0b1224);
    border:1px solid rgba(255,215,0,.25);
    border-radius:18px;
    padding:15px;
    margin-bottom:20px;
    overflow:hidden;


    box-shadow:
    0 10px 30px rgba(0,0,0,.35),
    inset 0 0 30px rgba(255,215,0,.05);
}

.logo-banner::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:2px;

    background:linear-gradient(
        90deg,
        gold,
        orange,
        gold
    );
}

.league-logo{
    display:block;
    width:100%;
    max-width:20px;
    height:auto;
    margin:0 auto 12px;
    object-fit:contain;


    filter:
    drop-shadow(0 0 12px rgba(255,215,0,.5));
}

.league-info{
    text-align:center;
}



.league-info h2{
    color:white;
    font-size:15px;
    line-height:1.3;
    margin-bottom:5px;
    font-weight:800;
}


@media (max-width:768px){

    .logo-banner{
        padding:10px;
        border-radius:12px;
    }

    .league-logo{
        max-width:140px;
    }

    .league-info h2{
        font-size:14px;
    }

    .league-info p{
        font-size:11px;
    }

    .league-tag{
        font-size:9px;
        padding:3px 8px;
    }
}

@media (max-width:420px){

    .league-logo{
        max-width:120px;
    }

    .league-info h2{
        font-size:12px;
    }

    .league-info p{
        font-size:10px;
    }

.leaderboard-btn{
    background:linear-gradient(135deg,gold,orange);
    color:#000;
    font-weight:700;
}

.leaderboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.leaderboard-img{
    width:70%;
    border-radius:15px;
    border:3px solid gold;
    box-shadow:0 0 20px rgba(255,215,0,.3);
    cursor:pointer;
    transition:.3s;
}

.leaderboard-img:hover{
    transform:scale(1.03);
}

@media(max-width:768px){
    .leaderboard-grid{
        grid-template-columns:1fr;
        padding:10px;
    }
}

</style>

</head>

let currentTeam = teams[0];

const teamList = document.getElementById("teamList");
const hero = document.getElementById("hero");
const playersDiv = document.getElementById("players");

/* ---------------- ANNOUNCEMENTS ---------------- */

const announcements = {
    "Turbo Titans":
        "Ladies and Gentlemen Welcome to OPL SEASON-6.Presenting Turbo Titans. The masters of speed and powerfull strike.",

    "Olive Firebirds":
        "Ladies and Gentlemen. Presenting Olive Firebirds. Rising from the flames with unstoppable passion.",

    "Team CC":
        "Ladies and Gentlemen. Presenting Team CC. Consistency, coordination, and confidence in every match..",

    "Black Panthers":
        "Ladies and Gentlemen. Presenting Black Panthers. Silent hunters ready to strike.",

    "Blue Olive Strikers":
        "Ladies and Gentlemen. Presenting Blue Olive Strikers. Precision, passion and performance.",

    "Power Warriors":
        "Ladies and Gentlemen. Presenting Power Warriors. Strength in every move and courage in every moment.",

    "Shadow Strikers":
        "Ladies and Gentlemen. Presenting Shadow Strikers. Emerging from the shadows to conquer the game.",

    "Victory Vikings":
        "Ladies and Gentlemen. Presenting Victory Vikings. Fearlessly sailing toward victory and glory."
};

/* ---------------- SPEECH ---------------- */

function speakTeamName(teamName) {
    if (isMuted) return;

    speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(
        announcements[teamName] || `Welcome to ${teamName}`
    );

    speech.rate = 0.9;
    speech.pitch = 1;
    speech.volume = 1;

    const voices = speechSynthesis.getVoices();
    if (voices.length > 0) {
        speech.voice = voices[0];
    }

    speechSynthesis.speak(speech);
}

/* ---------------- UI RENDER ---------------- */

function renderTeams() {
    teamList.innerHTML = "";

    teams.forEach((t, i) => {
        teamList.innerHTML += `
            <div class="team-btn" onclick="selectTeam(${i})">${t.name}</div>
        `;
    });
}

function renderPlayers(filter) {

    playersDiv.innerHTML = "";

    currentTeam.players
        .filter(p => p.name.toLowerCase().includes(filter.toLowerCase()))
        .forEach(p => {

            playersDiv.innerHTML += `
                <div class="player">
                    <img src="${p.photo}" onclick="zoomImage('${p.photo}')">
                    <h4>${p.name}</h4>

     <div class="player-stats">
    <!-- <p>🏏 Runs: ${p.runs}</p>
<p>🎯 Wickets: ${p.wickets}</p>
<p>6️⃣ Sixes: ${p.Sixes}</p>
<p>4️⃣ Fours: ${p.Fours}</p>
 <p>⭐ Score: ${p.score}</p> -->
   </div>
                </div>
            `;
        });
}

/* ---------------- TEAM SWITCH ---------------- */

function selectTeam(index) {
    currentIndex = index;
    currentTeam = teams[index];
	
	// Hide Leaderboard and show Team Dashboard
    document.getElementById("leaderboardPage").style.display = "none";
    document.getElementById("hero").style.display = "block";
    document.querySelector(".search").style.display = "block";
    document.getElementById("players").style.display = "grid";

    hero.style.background =
        `linear-gradient(135deg,${currentTeam.color},#0b1224)`;

    hero.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
            <div>
                <h1>${currentTeam.name}</h1>
            </div>

            <div style="text-align:right;">
                <div id="dateTime"></div>
                <button id="muteBtn">${isMuted ? "🔇 Voice OFF" : "🔊 Voice ON"}</button>
            </div>
        </div>

      <div class="owner">

    <img src="${currentTeam.ownerPhoto}"
     class="owner-photo"
     onclick="zoomImage('${currentTeam.ownerPhoto}')">

    <div>
        <h3>👑 Owner</h3>
        <h2>${currentTeam.owner}</h2>
		<div class="hero-trophy">
    🏆 Do you want to deserve this trophy? 
</div>
    </div>
	

        <div class="stats">
            <div class="stat"><h3>120</h3><p>Players</p></div>
            <div class="stat"><h3>OLIVE PREMIER LEAGUE</h3></div>
            <div class="stat"><h3>SEASON</h3><p>2026</p></div>
        </div>
		
		<div>

    <img src="${currentTeam.posterPhoto}"
         class="poster-img"
         onclick="zoomImage('${currentTeam.posterPhoto}')">

</div>

<div>

    <img src="${currentTeam.trophyPhoto}"
         class="trophy-img"
         onclick="zoomImage('${currentTeam.trophyPhoto}')">

</div>
		
		
    `;
	

    attachMuteButton();
    updateDateTime();
    renderPlayers("");
    speakTeamName(currentTeam.name);
}

/* ---------------- AUTO SWITCH ---------------- */

function autoChangeTeam() {
    setInterval(() => {
        if (!autoSwitch) return;

        currentIndex = (currentIndex + 1) % teams.length;
        selectTeam(currentIndex);

    }, 35000);
}

/* ---------------- MUTE BUTTON ---------------- */

function attachMuteButton() {
    const muteBtn = document.getElementById("muteBtn");

    muteBtn.onclick = () => {
        isMuted = !isMuted;

        if (isMuted) {
            speechSynthesis.cancel();
            muteBtn.innerHTML = "🔇 Voice OFF";
        } else {
            muteBtn.innerHTML = "🔊 Voice ON";
        }
    };
}

/* ---------------- DATE TIME ---------------- */

function updateDateTime() {
    const now = new Date();

    const options = {
        weekday: 'long',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
    };

    const date = now.toLocaleDateString('en-IN', options);
    const time = now.toLocaleTimeString('en-IN');

    const dt = document.getElementById("dateTime");

    if (dt) {
        dt.innerHTML = `${date}<br>${time}`;
    }
}

/* ---------------- INIT (IMPORTANT ORDER FIX) ---------------- */

window.speechSynthesis.onvoiceschanged = () => {
    speechSynthesis.getVoices();
};

renderTeams();
selectTeam(0);
autoChangeTeam();

updateDateTime();
setInterval(updateDateTime, 1000);

document.getElementById("search")
.addEventListener("input", (e) => {
    renderPlayers(e.target.value);
});


function zoomImage(src){
    document.getElementById("imageModal").style.display = "flex";
    document.getElementById("modalImg").src = src;
}

document.addEventListener("click", function(e){

    const modal = document.getElementById("imageModal");

    if(
        e.target.id === "imageModal" ||
        e.target.classList.contains("close-modal")
    ){
        modal.style.display = "none";
    }
});


function showLeaderboard(){

    document.getElementById("hero").style.display = "none";
    document.querySelector(".search").style.display = "none";
    document.getElementById("players").style.display = "none";

    document.getElementById("leaderboardPage").style.display = "block";
}






</script>
