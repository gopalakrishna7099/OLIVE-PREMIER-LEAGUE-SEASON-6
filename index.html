<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#050b18;
color:#fff;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:#0b1224;
padding:20px;
border-right:1px solid rgba(255,255,255,.1);
overflow-y:auto;
}

.sidebar h2{
color:gold;
text-align:center;
margin-bottom:20px;
}

.sidebar h3{
color:Orange;
text-align:center;
margin-bottom:20px;
}

.team-btn{
padding:12px;
margin:8px 0;
background:rgba(255,255,255,.05);
border-radius:10px;
cursor:pointer;
text-align:center;
transition:.3s;
font-weight:600;
}

.team-btn:hover{
background:gold;
color:#000;
transform:scale(1.05);
}

/* MAIN */
.main{
flex:1;
overflow-y:auto;
padding:5px;
}

/* HERO */
.hero{
padding:15px;
border-radius:20px;
background:linear-gradient(135deg,#1d4ed8,#0b1224);
position:relative;
overflow:hidden;
}

.hero h1{
font-size:2rem;
color:gold;
}

.owner{
display:flex;
align-items:center;
gap:20px;
margin-top:15px;
}

.owner img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid gold;
object-fit:cover;
}

.stats{
display:flex;
gap:20px;
margin-top:20px;
}

.stat{
background:rgba(255,255,255,.08);
padding:15px;
border-radius:12px;
text-align:center;
width:120px;
}

/* SEARCH */
.search{
margin:10px 0;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
outline:none;
}

/* PLAYERS */
.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.player{
background:rgba(255,255,255,.07);
padding:15px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.player:hover{
transform:translateY(-8px);
background:rgba(255,215,0,.15);
}

.player img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:3px solid #fff;
}

.player h4{
margin-top:10px;
font-size:14px;
}





/* =========================
   MOBILE RESPONSIVE DESIGN
========================= */

@media (max-width: 768px) {

body{
flex-direction: column;
height: auto;
overflow-y: auto;
}

/* SIDEBAR → TOP BAR */
.sidebar{
width: 100%;
display: flex;
flex-direction: column;
align-items: center;
padding: 10px;
border-right: none;
border-bottom: 1px solid rgba(255,255,255,.1);
}

.sidebar h2{
font-size: 16px;
margin-bottom: 10px;
}

.team-btn{
display: inline-block;
width: 45%;
margin: 5px;
font-size: 12px;
padding: 8px;
}

/* MAIN AREA */
.main{
padding: 10px;
}

/* HERO */
.hero{
padding: 10px;
border-radius: 15px;
}

.hero h1{
font-size: 18px;
}

.owner{
flex-direction: column;
text-align: center;
gap: 10px;
}

.owner img{
width: 90px;
height: 90px;
}

/* STATS */
.stats{
flex-direction: column;
gap: 10px;
align-items: center;
}

.stat{
width: 90%;
}

/* SEARCH */
.search input{
padding: 10px;
font-size: 14px;
}

/* PLAYERS GRID */
.players{
grid-template-columns: repeat(2, 1fr);
gap: 10px;
}

.player img{
width: 70px;
height: 70px;
}

.player h4{
font-size: 12px;
}
}

/* SMALL MOBILE (extra fix) */
@media (max-width: 420px) {

.players{
grid-template-columns: repeat(1, 1fr);
}

.team-btn{
width: 100%;
}
}

</style>

const playersDiv = document.getElementById("players");

function renderTeams(){
teamList.innerHTML = "";
teams.forEach((t,i)=>{
teamList.innerHTML += `
<div class="team-btn" onclick="selectTeam(${i})">${t.name}</div>
`;
});
}

function selectTeam(index){
currentIndex = index;
currentTeam = teams[index];

hero.style.background = `linear-gradient(135deg,${currentTeam.color},#0b1224)`;

hero.innerHTML = `
<h1>${currentTeam.name}</h1>
<div class="owner">
<img src="${currentTeam.ownerPhoto}">

<h3>Owner</h3>
<h2>${currentTeam.owner}</h2>

<div class="stat"><h3>SEASON</h3><p>2026</p></div>
</div>
`;

renderPlayers("");
}


function renderPlayers(filter){
playersDiv.innerHTML = "";

currentTeam.players
.filter(p=>p.name.toLowerCase().includes(filter.toLowerCase()))
.forEach(p=>{
playersDiv.innerHTML += `
<div class="player">
<img src="${p.photo}">
<h4>${p.name}</h4>
</div>
`;
});
}

document.getElementById("search")
.addEventListener("input",(e)=>{
renderPlayers(e.target.value);
});

selectTeam(0);


function autoChangeTeam(){

currentIndex = (currentIndex + 1) % teams.length;

}, 30000); // 30 seconds (half minute)
